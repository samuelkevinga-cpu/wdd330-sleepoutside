<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/checkout.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="checkout">
        <h2>Review & Place your Order</h2>

        <form name="checkout" class="checkout-form">
          <fieldset>
            <legend>Customer Information</legend>
            <label for="fname">First Name*</label>
            <input
              type="text"
              id="fname"
              name="fname"
              placeholder="e.g. John"
              required
            />

            <label for="lname">Last Name*</label>
            <input
              type="text"
              id="lname"
              name="lname"
              placeholder="e.g. Doe"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Address</legend>
            <label for="street">Street Address*</label>
            <input
              type="text"
              id="street"
              name="street"
              placeholder="e.g. 123 Main Street"
              required
            />

            <label for="city">City*</label>
            <input
              type="text"
              id="city"
              name="city"
              placeholder="e.g. Rexburg"
              required
            />

            <label for="state">State*</label>
            <input
              type="text"
              id="state"
              name="state"
              placeholder="e.g. ID"
              required
            />

            <label for="zip">Zip Code*</label>
            <input
              type="text"
              id="zip"
              name="zip"
              placeholder="e.g. 83440"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number*</label>
            <input
              type="text"
              id="cardNumber"
              name="cardNumber"
              placeholder="e.g. 1234123412341234"
              required
            />

            <label for="expiration">Expiration Date*</label>
            <input
              type="text"
              id="expiration"
              name="expiration"
              placeholder="MM/YY"
              required
            />

            <label for="code">Security Code*</label>
            <input
              type="text"
              id="code"
              name="code"
              placeholder="e.g. 123"
              required
            />
          </fieldset>

          <fieldset class="checkout-summary">
            <legend>Order Summary</legend>
            <p>Item Subtotal (<span id="num-items"></span>)</p>
            <p class="summary-value" id="cartTotal"></p>
            <p>Shipping Estimate:</p>
            <p class="summary-value" id="shipping"></p>
            <p>Tax:</p>
            <p class="summary-value" id="tax"></p>
            <p>Order Total:</p>
            <p class="summary-value" id="orderTotal"></p>
          </fieldset>

          <button type="submit" id="checkoutSubmit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
