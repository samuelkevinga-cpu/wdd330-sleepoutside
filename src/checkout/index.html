<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
       <section class="checkout-form-section">
        <form id="checkout-form" novalidate>
          <fieldset>
            <legend>Customer Name</legend>
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname" required />

            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname" required />
          </fieldset>

          <fieldset>
            <legend>Address</legend>
            <label for="street">Street Address</label>
            <input type="text" id="street" name="street" required />

            <label for="city">City</label>
            <input type="text" id="city" name="city" required />

            <label for="state">State</label>
            <input type="text" id="state" name="state" required />

            <label for="zip">Zip Code</label>
            <input type="text" id="zip" name="zip" required pattern="[0-9]{5}" title="5-digit zip code" />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" required pattern="[0-9]{13,16}" title="13 to 16 digit card number" />

            <label for="expiration">Expiration Date</label>
            <input type="month" id="expiration" name="expiration" required />

            <label for="code">Security Code</label>
            <input type="text" id="code" name="code" required pattern="[0-9]{3,4}" title="3 or 4 digit security code" />
          </fieldset>

          <p id="form-error-message" class="form-error hidden"></p>

          <button type="submit" id="checkoutButton">Checkout</button>
        </form>
      </section>
     
    </main>

  <footer id="main-footer"></footer>
  </body>
</html>
